name: Build & Release

# 触发条件：
#   - push 到 master：构建全平台并更新名为 latest 的滚动预发布(prerelease)
#   - push v* tag（如 v1.0.0）：构建全平台并发布带版本号的正式 Release
#   - 手动触发：workflow_dispatch
on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

# 需要写权限以创建 Release
permissions:
  contents: write

env:
  # 使用最新 stable 版本（必然满足 pubspec.lock 要求的 flutter >=3.44.0 / dart >=3.12.1）
  FLUTTER_CHANNEL: 'stable'

jobs:
  # ---------- Android ----------
  build-android:
    name: Build Android (APK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: flutter pub get
        run: flutter pub get

      # 使用 debug 签名构建 release APK（build.gradle.kts 当前 release 走 debug signingConfig）
      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
             dist/robomaster-custom-client-android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: dist/robomaster-custom-client-android.apk
          if-no-files-found: error

  # ---------- Windows ----------
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: flutter pub get
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      # 将 Release 目录打包为 zip
      - name: Package Windows
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $src = "build/windows/x64/runner/Release"
          Compress-Archive -Path "$src/*" -DestinationPath "dist/robomaster-custom-client-windows.zip" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: dist/robomaster-custom-client-windows.zip
          if-no-files-found: error

  # ---------- Linux ----------
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      # Linux 桌面构建所需系统依赖；mpv 供 media_kit 运行时使用
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libmpv-dev mpv

      - name: flutter pub get
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      # Flutter 默认不会把 media_kit / libmpv 及其递归依赖打包进 bundle，
      # 导致 Linux release 包在缺少系统 mpv 的机器上无法启动。
      # 这里用 ldd 递归收集主程序+libmpv 依赖的所有动态库，制成绿色包。
      - name: Bundle all runtime shared libraries
        run: |
          BUNDLE_DIR="build/linux/x64/release/bundle"
          BUNDLE_LIB_DIR="$BUNDLE_DIR/lib"
          BINARY="$BUNDLE_DIR/robomaster_custom_client_1"
          mkdir -p "$BUNDLE_LIB_DIR"

          # 系统核心库：几乎所有 Linux 发行版都自带，且版本差异大，不建议 bundle
          SYSTEM_LIBS="libc.so.6 libm.so.6 libgcc_s.so.1 libstdc++.so.6 libpthread.so.0 libdl.so.2 librt.so.1 ld-linux-x86-64.so.2 linux-vdso.so.1 linux-gate.so.1"

          # 递归 ldd 一个二进制/库，输出所有依赖的 so 绝对路径
          collect_deps() {
            local target="$1"
            [ -f "$target" ] || return
            ldd "$target" 2>/dev/null | awk '
              /=>/ {
                gsub(/^[ \t]+|[ \t]+$/, "", $3);
                if ($3 ~ /^\//) print $3
              }
              !/=>/ {
                gsub(/^[ \t]+|[ \t]+$/, "", $1);
                if ($1 ~ /^\//) print $1
              }
            '
          }

          # 收集入口：主程序和所有已存在的插件 so
          TARGETS=("$BINARY")
          for so in "$BUNDLE_LIB_DIR"/*.so "$BUNDLE_LIB_DIR"/*.so.*; do
            [ -f "$so" ] && TARGETS+=("$so")
          done

          # 额外定位 libmpv，确保 ldd 有东西可扫
          MPV_PATHS=(
            /usr/lib/x86_64-linux-gnu/libmpv.so.2
            /usr/lib/x86_64-linux-gnu/libmpv.so
            /usr/local/lib/libmpv.so.2
            /usr/local/lib/libmpv.so
          )
          for mpv in "${MPV_PATHS[@]}"; do
            [ -f "$mpv" ] && TARGETS+=("$mpv") && break
          done

          # 递归收集（BFS），直到没有新库出现
          declare -A COPIED
          queue=("${TARGETS[@]}")
          while [ ${#queue[@]} -gt 0 ]; do
            current="${queue[0]}"
            queue=("${queue[@]:1}")
            [ -f "$current" ] || continue
            while IFS= read -r dep; do
              [ -n "$dep" ] || continue
              # 跳过系统核心库
              skip=false
              for sys in $SYSTEM_LIBS; do
                if [[ "$(basename "$dep")" == "$sys" ]]; then
                  skip=true
                  break
                fi
              done
              $skip && continue
              # 如果还没复制，就复制并加入队列继续递归
              name=$(basename "$dep")
              if [ -z "${COPIED[$name]:-}" ]; then
                if [ -f "$dep" ]; then
                  cp -v "$dep" "$BUNDLE_LIB_DIR/$name"
                  COPIED[$name]=1
                  queue+=("$BUNDLE_LIB_DIR/$name")
                fi
              fi
            done < <(collect_deps "$current")
          done

          # 额外兜底：显式复制 libmpv* 和 libmujs*
          for lib in libmpv.so libmpv.so.2 libmpv.so.3 libmujs.so libmujs.so.3; do
            for prefix in /usr/lib/x86_64-linux-gnu /usr/local/lib; do
              if [ -f "$prefix/$lib" ] && [ ! -f "$BUNDLE_LIB_DIR/$lib" ]; then
                cp -v "$prefix/$lib" "$BUNDLE_LIB_DIR/$lib"
              fi
            done
          done

          # 验证关键库是否已 bundle，并报告最终缺失
          echo "=== Bundled libraries ==="
          ls -la "$BUNDLE_LIB_DIR"
          echo "=== Remaining unresolved dependencies ==="
          ldd "$BINARY" | grep 'not found' || echo "All resolved"

      # 将 bundle 目录打包为 tar.gz
      - name: Package Linux
        run: |
          mkdir -p dist
          tar -czf dist/robomaster-custom-client-linux.tar.gz \
            -C build/linux/x64/release/bundle .

      - uses: actions/upload-artifact@v4
        with:
          name: linux-targz
          path: dist/robomaster-custom-client-linux.tar.gz
          if-no-files-found: error

  # ---------- Release ----------
  release:
    name: Publish Release
    needs: [build-android, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # 把所有产物收拢到一个目录
      - name: Collect files
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release

      # tag 推送 → 正式版 Release（用 tag 名作为版本）
      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false

      # master 分支推送 → 滚动预发布 latest
      # 先删除旧的 latest release 与 tag，确保 tag 重新指向当前最新提交
      - name: Delete previous "latest" release
        if: github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --repo "$GITHUB_REPOSITORY" --cleanup-tag --yes || true

      - name: Publish rolling "latest" prerelease
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          target_commitish: ${{ github.sha }}
          name: 'Latest build (master)'
          body: |
            滚动构建，对应 master 分支最新提交 ${{ github.sha }}。
            每次推送 master 会自动覆盖更新。正式版本请使用带 v 版本号的 Release。
          files: release/*
          prerelease: true
          make_latest: false
